[platformio]
src_dir = src
default_envs = cores3-se

[common]
framework = arduino
lib_deps =
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.0
build_flags = -std=gnu++17
monitor_speed = 115200

[env:cores3-se]
extends = common
platform = espressif32
board = m5stack-cores3
build_src_filter = +<*> +<../boards/cores3_se/>
build_flags =
    ${common.build_flags}
    -DBOARD_CORES3_SE
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I boards/cores3_se

; Same as cores3-se but with serial debug logging (M5CT_DBG) enabled. Use for
; bring-up/debugging only — it writes [dbg] lines onto the protocol serial line.
[env:cores3-se-debug]
extends = env:cores3-se
build_flags =
    ${env:cores3-se.build_flags}
    -DM5CT_DEBUG

[env:cardputer-adv]
extends = common
platform = espressif32
; Cardputer ADV uses ESP32-S3. PIO doesn't ship a Cardputer board file, so we
; use the generic devkit; M5Unified handles board-specific behavior at runtime
; via fallback_board = board_M5Cardputer set in boards/cardputer_adv/board.cpp.
board = esp32-s3-devkitc-1
build_src_filter = +<*> +<../boards/cardputer_adv/>
build_flags =
    ${common.build_flags}
    -DBOARD_CARDPUTER_ADV
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:native]
platform = native
test_framework = unity
build_src_filter = +<*>
build_flags = -std=gnu++17 -DBOARD_MOCK
lib_deps = bblanchon/ArduinoJson@^7.0
