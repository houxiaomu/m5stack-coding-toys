name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm gen:msgs:check

  firmware:
    name: Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run --project-dir firmware -e native
      - run: pio test --project-dir firmware -e native
      # ESP32 builds left out of CI for M0; they need extra disk + time.
      # Add cores3-se and cardputer-adv to CI in M2.
